name: CI-CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # TAG üret
      - name: Set TAG
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # Build
      - name: Build
        run: ./gradlew clean build -x test

      # Docker login
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Image build & push
      - name: Build & Push
        run: |
          docker build -t ykrn/vitaflow-auth:${{ env.TAG }} .
          docker push ykrn/vitaflow-auth:${{ env.TAG }}

      # Deploy
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 204.168.211.21
          username: vitaflow
          key: ${{ secrets.SSH_KEY }}
          envs: TAG
          script: |
            echo "Deploying version: $TAG"
            cd ~/vitaflow

            docker pull ykrn/vitaflow-auth:$TAG

            TAG=$TAG docker compose -f docker-compose-app.yml up -d --force-recreate app